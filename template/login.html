<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-1 flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-sm sm:max-w-md bg-white rounded-xl shadow-lg p-6 sm:p-8">
    <h2 class="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-6">Kirish</h2>
    
    <form action="#" method="POST" class="space-y-4 sm:space-y-5">
      {% csrf_token %}
      <div>
        <label for="name" class="block mb-1 sm:mb-2 text-gray-700 font-medium text-sm sm:text-base">Name</label>
        <input type="text" id="name" name="name" placeholder="name"
          class="w-full px-3 sm:px-4 py-2 sm:py-2.5 border rounded-lg text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
      </div>

      <div>
        <label for="password" class="block mb-1 sm:mb-2 text-gray-700 font-medium text-sm sm:text-base">Parol</label>
        <input type="password" id="password" name="password" placeholder="********"
          class="w-full px-3 sm:px-4 py-2 sm:py-2.5 border rounded-lg text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
      </div>

      <div class="flex items-center justify-between text-xs sm:text-sm">
        <label class="flex items-center space-x-2 text-gray-600">
          <input type="checkbox" class="h-4 w-4 rounded border-gray-300 focus:ring-blue-500">
          <span>Remember me</span>
        </label>
        <a href="#" class="text-blue-500 hover:underline">Parolni unutdingiz?</a>
      </div>

      <button
        class="w-full bg-blue-500 text-white py-2 sm:py-2.5 rounded-lg hover:bg-blue-600 transition duration-300 font-semibold text-sm sm:text-base">Kirish</button>

      <p class="text-center text-gray-600 text-xs sm:text-sm mt-3 sm:mt-4">
        Hisobingiz yo‘qmi? 
        <a href="#" class="text-blue-500 hover:underline">Ro‘yxatdan o‘tish mumkin emas</a>
      </p>
    </form>
  </div>

</body>
</html>
